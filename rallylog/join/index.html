<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RallyLog チームに参加</title>
  <meta name="description" content="RallyLogのチーム招待ページ。コードを入力してチームに参加できます。">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/rallylog/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#071A1D; --stroke:rgba(94,200,212,.16); --text:#F0F8F7; --sub:#8FB2B2; --accent:#F09A5E; --accent2:#56C4D2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Noto Sans JP",-apple-system,sans-serif; background:
      radial-gradient(1200px 800px at 80% -10%, rgba(86,196,210,.10), transparent 60%),
      radial-gradient(1000px 700px at 0% 10%, rgba(240,154,94,.08), transparent 55%), var(--bg);
      color:var(--text); min-height:100vh; display:grid; place-items:center; text-align:center; padding:2rem; line-height:1.8; }
    .card { max-width:420px; background:rgba(18,52,58,.55); border:1px solid var(--stroke); border-radius:20px; padding:2rem 1.6rem; backdrop-filter:blur(8px); }
    img.icon { width:72px; height:72px; border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,.4); }
    h1 { font-family:"Outfit",sans-serif; font-size:1.5rem; font-weight:900; letter-spacing:.05em; margin:.8rem 0 .2rem; }
    p { color:var(--sub); font-size:.92rem; margin:.4rem 0; }
    .code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:2rem; font-weight:900; letter-spacing:.15em;
      color:var(--accent); background:rgba(240,154,94,.08); border:1px dashed rgba(240,154,94,.4); border-radius:12px; padding:.5rem 1rem; margin:.8rem 0; user-select:all; }
    .btn { display:block; font-weight:800; font-size:1rem; text-decoration:none; border-radius:999px; padding:.85rem 1.4rem; margin:.5rem 0; }
    .btn.primary { color:#04272B; background:linear-gradient(135deg,var(--accent),var(--accent2)); }
    .btn.ghost { color:var(--text); border:1px solid var(--stroke); background:rgba(255,255,255,.04); font-size:.9rem; }
    .steps { text-align:left; font-size:.85rem; color:var(--sub); margin-top:1rem; padding-left:1.2rem; }
    .steps li { margin:.3rem 0; }
  </style>
</head>
<body>
  <main class="card">
    <img class="icon" src="/rallylog/icon.png" alt="RallyLog アイコン">
    <h1>RallyLog チームに参加</h1>
    <p>チームへの招待コードが届いています。</p>

    <div class="code" id="code">--------</div>

    <a class="btn primary" id="openApp" href="#">アプリで開く</a>
    <a class="btn ghost" href="/rallylog/">RallyLog について</a>

    <ol class="steps">
      <li>RallyLog アプリをインストール（現在はTestFlight配信中）</li>
      <li>「アプリで開く」を押すか、アプリの「チーム」→「作成・参加」で上のコードを入力</li>
      <li>チームに参加すると、試合の記録・観戦ができます</li>
    </ol>
  </main>

  <script>
    const code = (new URLSearchParams(location.search).get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12);
    if (code) {
      document.getElementById('code').textContent = code;
      document.getElementById('openApp').href = 'rallylog://join?code=' + code;
    } else {
      document.getElementById('code').textContent = 'コードなし';
      document.getElementById('openApp').style.display = 'none';
    }
  </script>
</body>
</html>

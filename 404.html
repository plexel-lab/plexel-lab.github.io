<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ページが見つかりません — Plexel</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon-64.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#070A14; --stroke:rgba(127,180,255,.14); --text:#EAF0FB; --sub:#97A3C0; --accent:#6FE3C4; --accent2:#7FB4FF; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Noto Sans JP",-apple-system,sans-serif; background:
      radial-gradient(1200px 800px at 80% -10%, rgba(127,180,255,.10), transparent 60%),
      radial-gradient(1000px 700px at 0% 10%, rgba(111,227,196,.08), transparent 55%), var(--bg);
      color:var(--text); min-height:100vh; display:grid; place-items:center; text-align:center; padding:2rem; }
    h1 { font-family:"Outfit",sans-serif; font-size:clamp(4rem,18vw,7rem); font-weight:900; margin:0;
      background:linear-gradient(110deg,#EAF0FB 10%,var(--accent) 50%,var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    p { color:var(--sub); margin:.6rem 0 1.6rem; }
    a { display:inline-block; font-weight:700; font-size:.95rem; color:#06281F; text-decoration:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:.7rem 1.6rem; border-radius:999px; }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>お探しのページは見つかりませんでした。</p>
    <a href="/">アプリ一覧へ戻る</a>
  </main>
</body>
</html>
